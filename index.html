<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Vibes</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f0f0f;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        /* Neon Text */
        .neon-text {
            font-size: 60px;
            margin-top: 100px;
            color: #fff;
            text-shadow:
                0 0 5px #00ffff,
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff,
                0 0 80px #00ffff;
        }

        /* Neon Button */
        .neon-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 20px;
            color: #00ffff;
            border: 2px solid #00ffff;
            background: transparent;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            box-shadow: 0 0 10px #00ffff, 0 0 40px #00ffff inset;
        }

        .neon-btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff, 0 0 60px #00ffff;
        }

        /* Neon Card */
        .neon-card {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 2px solid #ff00ff;
            border-radius: 20px;
            box-shadow: 0 0 20px #ff00ff;
        }

        .neon-card h2 {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

    </style>
</head>
<body>

    <h1 class="neon-text">Welcome to Neon World</h1>

    <a href="#" class="neon-btn">Click Me</a>

    <div class="neon-card">
        <h2>About Us</h2>
        <p>We create glowing futuristic web designs with vibrant neon effects.</p>
    </div>

</body>
</html>
